[tools]
just = "latest"
node = "22"
python = "3.12"
rust = "stable"
uv = "latest"

[settings]
auto_install = true
parallel_install = true

[scripts]
build = "cargo build"
build-release = "cargo build --release"
build-release-locked = "vx cargo build --release --locked -p fpt-cli"
capabilities = "vx cargo run -p fpt-cli -- capabilities --output json"
check = "vx cargo check --workspace"
ci = "vx just ci"
default = "just default"
doc = "cargo doc"
fmt = "vx cargo fmt --all"
fmt-check = "vx cargo fmt --all -- --check"
format = "cargo fmt"
lint = "vx cargo clippy --workspace --all-targets -- -D warnings"
clawhub-sync = "vx just clawhub-sync"
clawhub-sync-dry-run = "vx just clawhub-sync-dry-run"
package-openclaw-skill = "vx just package-openclaw-skill"
package-skills = "vx just package-skills"
pre-commit-install = "vx just pre-commit-install"
pre-commit-run = "vx just pre-commit-run"
run = "just run"
test = "vx cargo test --workspace"
